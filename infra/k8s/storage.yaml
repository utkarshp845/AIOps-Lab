apiVersion: v1
kind: PersistentVolume
metadata:
  name: ai-infra-shared-logs
  labels:
    app.kubernetes.io/name: ai-infra-shared-logs
    app.kubernetes.io/part-of: ai-infra-starter-kit
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: ai-infra-local
  hostPath:
    path: /var/local/ai-infra-starter-kit/logs
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-service-logs
  namespace: ai-infra-starter-kit
  labels:
    app.kubernetes.io/name: demo-service-logs
    app.kubernetes.io/part-of: ai-infra-starter-kit
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ai-infra-local
  volumeName: ai-infra-shared-logs
  resources:
    requests:
      storage: 1Gi

