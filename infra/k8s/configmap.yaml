apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-lab-config
  namespace: aiops-lab
  labels:
    app.kubernetes.io/name: aiops-lab-config
    app.kubernetes.io/part-of: aiops-lab
data:
  # Safe-to-commit application configuration. Do not put API keys here.
  DEMO_SERVICE_LOG_PATH: /shared/logs/demo-service.log
  DEMO_SERVICE_METRICS_URL: http://demo-service:8000/metrics
  # Keep the default rule-based path enabled so the lab works without external API access.
  LLM_PROVIDER: none
  OPENAI_BASE_URL: https://api.openai.com/v1
  MODEL_NAME: gpt-4o-mini
  # Bound optional provider prompt size so local experiments stay predictable.
  LLM_MAX_LOG_ENTRIES: "50"
  LLM_MAX_PROMPT_CHARS: "12000"
  # Optional deployment-owned prices in USD per one million tokens. Keep blank when unknown.
  LLM_INPUT_USD_PER_MILLION_TOKENS: ""
  LLM_OUTPUT_USD_PER_MILLION_TOKENS: ""
