apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-service
  namespace: ai-infra-starter-kit
  labels:
    app.kubernetes.io/name: demo-service
    app.kubernetes.io/part-of: ai-infra-starter-kit
    app.kubernetes.io/component: demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-service
        app.kubernetes.io/part-of: ai-infra-starter-kit
        app.kubernetes.io/component: demo-api
    spec:
      containers:
        - name: demo-service
          image: ai-infra-starter-kit/demo-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DEMO_SERVICE_LOG_PATH
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: DEMO_SERVICE_LOG_PATH
          volumeMounts:
            - name: demo-logs
              mountPath: /shared/logs
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: demo-logs
          persistentVolumeClaim:
            claimName: demo-service-logs
---
apiVersion: v1
kind: Service
metadata:
  name: demo-service
  namespace: ai-infra-starter-kit
  labels:
    app.kubernetes.io/name: demo-service
    app.kubernetes.io/part-of: ai-infra-starter-kit
    app.kubernetes.io/component: demo-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-service
  ports:
    - name: http
      port: 8000
      targetPort: http
