apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-service
  namespace: aiops-lab
  labels:
    app.kubernetes.io/name: demo-service
    app.kubernetes.io/part-of: aiops-lab
    app.kubernetes.io/component: demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-service
        app.kubernetes.io/part-of: aiops-lab
        app.kubernetes.io/component: demo-api
    spec:
      containers:
        - name: demo-service
          image: aiops-lab/demo-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DEMO_SERVICE_LOG_PATH
              valueFrom:
                configMapKeyRef:
                  name: aiops-lab-config
                  key: DEMO_SERVICE_LOG_PATH
          volumeMounts:
            - name: demo-logs
              mountPath: /shared/logs
          # Readiness answers whether this pod should receive traffic.
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness answers whether Kubernetes should restart the container.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          # Requests guide scheduling; limits cap local resource use for this learning lab.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: demo-logs
          persistentVolumeClaim:
            claimName: demo-service-logs
---
apiVersion: v1
kind: Service
metadata:
  name: demo-service
  namespace: aiops-lab
  labels:
    app.kubernetes.io/name: demo-service
    app.kubernetes.io/part-of: aiops-lab
    app.kubernetes.io/component: demo-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-service
  ports:
    - name: http
      port: 8000
      targetPort: http
