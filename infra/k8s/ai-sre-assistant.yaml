apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-assistant
  namespace: ai-infra-starter-kit
  labels:
    app.kubernetes.io/name: ai-sre-assistant
    app.kubernetes.io/part-of: ai-infra-starter-kit
    app.kubernetes.io/component: sre-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-sre-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-sre-assistant
        app.kubernetes.io/part-of: ai-infra-starter-kit
        app.kubernetes.io/component: sre-assistant
    spec:
      containers:
        - name: ai-sre-assistant
          image: ai-infra-starter-kit/ai-sre-assistant:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: LLM_PROVIDER
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: OPENAI_BASE_URL
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: MODEL_NAME
            - name: LLM_MAX_LOG_ENTRIES
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: LLM_MAX_LOG_ENTRIES
            - name: LLM_MAX_PROMPT_CHARS
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: LLM_MAX_PROMPT_CHARS
            - name: DEMO_SERVICE_LOG_PATH
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: DEMO_SERVICE_LOG_PATH
            - name: DEMO_SERVICE_METRICS_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-infra-starter-kit-config
                  key: DEMO_SERVICE_METRICS_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-sre-assistant-secrets
                  key: OPENAI_API_KEY
                  optional: true
          volumeMounts:
            - name: demo-logs
              mountPath: /shared/logs
          # The assistant uses /health for readiness in this first local lesson.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness answers whether Kubernetes should restart the container.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          # Requests guide scheduling; limits cap local resource use for this learning lab.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: demo-logs
          persistentVolumeClaim:
            claimName: demo-service-logs
---
apiVersion: v1
kind: Service
metadata:
  name: ai-sre-assistant
  namespace: ai-infra-starter-kit
  labels:
    app.kubernetes.io/name: ai-sre-assistant
    app.kubernetes.io/part-of: ai-infra-starter-kit
    app.kubernetes.io/component: sre-assistant
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-sre-assistant
  ports:
    - name: http
      port: 8001
      targetPort: http
